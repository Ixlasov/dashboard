<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Dashboard Iframe</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #1e40af; /* Header rangiga mos */
        }
        iframe {
            border: none; width: 100%; height: 100%;
            display: block;
        }
    </style>
</head>
<body>
    <iframe id="cabinetFrame" src="" allow="geolocation; microphone; camera"></iframe>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Telegramda butun ekranga yoyish
        tg.enableClosingConfirmation(); // Yopishdan oldin so'rash

        const scriptUrl = "https://script.google.com/macros/s/AKfycbxMODQ5nUHugL4OneiR6J5fK1EL_Nv5Enhn7c1HOBRDCwdTiib-BqJrunoHp39b3yAGuw/exec";
        const queryString = window.location.search;
        const frame = document.getElementById('cabinetFrame');
        
        // Iframe manzilini o'rnatish
        frame.src = scriptUrl + (queryString || "?page=cabinet");

        // Telegram rangini o'rnatish
        tg.setHeaderColor('#1E40AF');
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mening AppSheet Ilovam</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden; /* Scroll chiqib ketmasligi uchun */
        }
        .app-container {
            width: 100vw;
            height: 100vh;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <iframe 
            src="https://www.appsheet.com/start/4a177a96-e22d-4554-963c-28360a3bd713" 
            allow="camera; microphone; geolocation; fullscreen; display-capture" 
            allowfullscreen>
        </iframe>
    </div>

</body>
</html>

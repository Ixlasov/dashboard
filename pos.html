<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Barcode Scanner</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f5f5f5;
    padding:10px;
}

.header{
    display:flex;
    gap:10px;
    margin-bottom:10px;
}

#barcodeInput{
    flex:1;
    height:55px;
    padding:0 15px;
    font-size:18px;
    border:1px solid #ccc;
    border-radius:12px;
}

#scanBtn{
    width:60px;
    border:none;
    border-radius:12px;
    background:#2196f3;
    color:#fff;
    font-size:24px;
}

#scanner{
    display:none;
    position:fixed;
    inset:0;
    background:#000;
    z-index:9999;
}

#video{
    width:100%;
    height:100%;
    object-fit:cover;
}

.overlay{
    position:absolute;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    pointer-events:none;
}

.scan-box{
    width:85%;
    height:280px;
    border:4px solid #fff;
    border-radius:20px;
    position:relative;
    overflow:hidden;
}

.scan-line{
    position:absolute;
    width:100%;
    height:4px;
    background:red;
    animation:scan 2s linear infinite;
}

@keyframes scan{
    0%{
        top:0;
    }
    100%{
        top:100%;
    }
}

#closeBtn{
    position:absolute;
    top:20px;
    right:20px;
    width:50px;
    height:50px;
    border:none;
    border-radius:50%;
    font-size:24px;
    background:#fff;
    z-index:10000;
}

.zoom-panel{
    position:absolute;
    bottom:30px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    align-items:center;
    gap:10px;
    background:#fff;
    padding:10px 15px;
    border-radius:12px;
}

.zoom-panel button{
    width:40px;
    height:40px;
    border:none;
    border-radius:10px;
    font-size:22px;
}

table{
    width:100%;
    border-collapse:collapse;
    background:#fff;
}

th,td{
    border:1px solid #ddd;
    padding:10px;
    text-align:center;
}

th{
    background:#2196f3;
    color:#fff;
}

</style>
</head>

<body>

<div class="header">
    <input id="barcodeInput" placeholder="Shtrix kod">
    <button id="scanBtn">📷</button>
</div>

<table>
    <thead>
        <tr>
            <th>#</th>
            <th>Barcode</th>
        </tr>
    </thead>
    <tbody id="tbody"></tbody>
</table>

<div id="scanner">

    <button id="closeBtn">✕</button>

    <video id="video" autoplay playsinline></video>

    <div class="overlay">
        <div class="scan-box">
            <div class="scan-line"></div>
        </div>
    </div>

    <div class="zoom-panel">
        <button onclick="changeZoom(-1)">-</button>
        <span id="zoomText">1x</span>
        <button onclick="changeZoom(1)">+</button>
    </div>

</div>

<script>

let stream = null;
let track = null;
let detector = null;
let zoom = 1;
let rowNo = 1;
let scanning = false;

const scanner = document.getElementById("scanner");
const video = document.getElementById("video");
const tbody = document.getElementById("tbody");
const barcodeInput = document.getElementById("barcodeInput");

if ("BarcodeDetector" in window) {

    detector = new BarcodeDetector({
        formats: [
            "ean_13",
            "ean_8",
            "code_128",
            "code_39",
            "upc_a",
            "upc_e"
        ]
    });

} else {

    alert("BarcodeDetector qo'llab-quvvatlanmaydi");
}

document.getElementById("scanBtn")
.addEventListener("click", openCamera);

document.getElementById("closeBtn")
.addEventListener("click", closeCamera);

async function openCamera(){

    try{

        scanner.style.display = "block";

        stream = await navigator.mediaDevices.getUserMedia({
            video:{
                facingMode:{
                    ideal:"environment"
                },
                width:{
                    ideal:1920
                },
                height:{
                    ideal:1080
                }
            }
        });

        video.srcObject = stream;

        track = stream.getVideoTracks()[0];

        scanning = true;

        detectLoop();

    }catch(err){

        alert("Kamera ochilmadi");
        console.log(err);
    }
}

async function detectLoop(){

    while(scanning){

        try{

            const barcodes =
                await detector.detect(video);

            if(barcodes.length){

                const code =
                    barcodes[0].rawValue;

                addBarcode(code);

                navigator.vibrate?.(100);

                closeCamera();

                return;
            }

        }catch(e){}

        await new Promise(r=>setTimeout(r,50));
    }
}

function addBarcode(code){

    barcodeInput.value = code;

    const row = `
        <tr>
            <td>${rowNo++}</td>
            <td>${code}</td>
        </tr>
    `;

    tbody.insertAdjacentHTML(
        "afterbegin",
        row
    );
}

function closeCamera(){

    scanning = false;

    scanner.style.display = "none";

    if(stream){

        stream.getTracks()
        .forEach(track => track.stop());
    }
}

async function changeZoom(step){

    if(!track) return;

    const capabilities =
        track.getCapabilities();

    if(!capabilities.zoom) return;

    zoom += step;

    if(zoom < capabilities.zoom.min)
        zoom = capabilities.zoom.min;

    if(zoom > capabilities.zoom.max)
        zoom = capabilities.zoom.max;

    try{

        await track.applyConstraints({
            advanced:[
                {
                    zoom:zoom
                }
            ]
        });

        document.getElementById("zoomText")
        .innerText =
        zoom.toFixed(1) + "x";

    }catch(err){
        console.log(err);
    }
}

</script>

</body>
</html>

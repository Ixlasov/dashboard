<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barcode Scanner</title>

    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        body{
    margin:0;
    font-family:sans-serif;
}

.toolbar{
    display:flex;
    padding:10px;
    gap:10px;
}

.toolbar input{
    flex:1;
    height:50px;
    font-size:18px;
}

.toolbar button{
    width:60px;
}

#scannerModal{
    display:none;
    position:fixed;
    inset:0;
    background:black;
    z-index:9999;
}

#video{
    width:100%;
    height:100%;
    object-fit:cover;
}

#scanArea{
    position:absolute;
    width:80%;
    height:250px;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    border:3px solid white;
    border-radius:15px;
    overflow:hidden;
}

#scanLine{
    position:absolute;
    width:100%;
    height:3px;
    background:red;
    animation:scan 2s linear infinite;
}

@keyframes scan{
    from{top:0}
    to{top:100%}
}

#closeBtn{
    position:absolute;
    top:20px;
    right:20px;
    width:50px;
    height:50px;
}

#zoomBox{
    position:absolute;
    bottom:30px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:10px;
    background:white;
    padding:10px;
    border-radius:10px;
}
    </style>
</head>

<body>

    <div class="toolbar">
    <input type="text" id="barcodeInput" placeholder="Shtrix kod">
    <button id="scanBtn">
        <i class="ti ti-barcode"></i>
    </button>
</div>

<div id="scannerModal">
    <video id="video" autoplay playsinline></video>

    <div id="scanArea">
        <div id="scanLine"></div>
    </div>

    <div id="zoomBox">
        <button onclick="setZoom(-1)">-</button>
        <span id="zoomValue">1x</span>
        <button onclick="setZoom(1)">+</button>
    </div>

    <button id="closeBtn">✕</button>
</div>

<table>
    <thead>
        <tr>
            <th>#</th>
            <th>Barcode</th>
        </tr>
    </thead>
    <tbody id="resultBody"></tbody>
</table>

    <script type="module">

const video = document.getElementById("video");
const modal = document.getElementById("scannerModal");

let stream;
let detector;
let zoom = 1;
let track;
let counter = 1;

if ("BarcodeDetector" in window) {
    detector = new BarcodeDetector({
        formats:[
            "ean_13",
            "ean_8",
            "code_128",
            "upc_a",
            "upc_e"
        ]
    });
}

document.getElementById("scanBtn")
.addEventListener("click", openCamera);

document.getElementById("closeBtn")
.addEventListener("click", closeCamera);

async function openCamera(){

    modal.style.display="block";

    stream = await navigator.mediaDevices.getUserMedia({
        video:{
            facingMode:{
                ideal:"environment"
            },
            width:{ideal:1920},
            height:{ideal:1080}
        }
    });

    video.srcObject = stream;

    track = stream.getVideoTracks()[0];

    startDetect();
}

async function startDetect(){

    while(modal.style.display==="block"){

        try{

            const codes =
                await detector.detect(video);

            if(codes.length){

                const value =
                    codes[0].rawValue;

                addRow(value);

                closeCamera();
                break;
            }

        }catch(e){}

        await new Promise(r=>setTimeout(r,80));
    }
}

function addRow(code){

    barcodeInput.value = code;

    resultBody.insertAdjacentHTML(
        "afterbegin",
        `
        <tr>
            <td>${counter++}</td>
            <td>${code}</td>
        </tr>
        `
    );
}

async function setZoom(step){

    if(!track) return;

    const caps = track.getCapabilities();

    if(!caps.zoom) return;

    zoom += step;

    if(zoom < caps.zoom.min)
        zoom = caps.zoom.min;

    if(zoom > caps.zoom.max)
        zoom = caps.zoom.max;

    await track.applyConstraints({
        advanced:[{zoom}]
    });

    zoomValue.innerText =
        zoom.toFixed(1) + "x";
}

function closeCamera(){

    modal.style.display="none";

    if(stream){
        stream.getTracks()
            .forEach(t=>t.stop());
    }
}

</script>

</body>

</html>

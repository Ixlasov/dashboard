<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Shtrix-kod Skaner</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .input-group { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
        #reader { width: 300px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        .icon { cursor: pointer; font-size: 24px; }
    </style>
</head>
<body>

    <div class="input-group">
        <input type="text" id="resultInput" placeholder="Shtrix-kod natijasi">
        <span class="icon" onclick="startScanner()">📷</span>
    </div>

    <div id="reader"></div>

    <table id="resultTable">
        <thead>
            <tr>
                <th>ID/Shtrix-kod</th>
                <th>Vaqt</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <script>
        const html5QrCode = new Html5Qrcode("reader");

        function startScanner() {
            html5QrCode.start(
                { facingMode: "environment" }, // Orqa kamera
                { fps: 10, qrbox: 250 },
                (decodedText) => {
                    // Natijani inputga yozish
                    document.getElementById('resultInput').value = decodedText;
                    
                    // Jadvalga qo'shish
                    addRow(decodedText);
                    
                    // Skanerni to'xtatish
                    html5QrCode.stop();
                }
            ).catch(err => alert("Kamerani ochishda xatolik: " + err));
        }

        function addRow(data) {
            const tbody = document.querySelector("#resultTable tbody");
            const row = tbody.insertRow();
            row.insertCell(0).innerText = data;
            row.insertCell(1).innerText = new Date().toLocaleTimeString();
        }
    </script>
</body>
</html>

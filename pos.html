<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Skaner</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; }
        #reader { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
        
        /* Jadval uchun dizayn */
        #dataList { position: absolute; bottom: 0; width: 100%; max-height: 30%; background: white; overflow-y: auto; z-index: 10; }
        table { width: 100%; border-collapse: collapse; }
        td { padding: 10px; border-bottom: 1px solid #ccc; }
    </style>
</head>
<body>

    <div id="reader"></div>

    <div id="dataList">
        <table id="resultTable"><tbody></tbody></table>
    </div>

    <script>
        // Kamerani avtomatik ochish
        const html5QrCode = new Html5Qrcode("reader");
        
        function startScanner() {
            html5QrCode.start(
                { facingMode: "environment" }, 
                { fps: 10, qrbox: {width: 250, height: 400} },
                (decodedText) => {
                    addRow(decodedText);
                    // Skanerlagandan so'ng qayta skanerlashni to'xtatmaslik uchun 
                    // kerak bo'lsa bu qatorni olib tashlang:
                    // html5QrCode.stop(); 
                }
            ).catch(err => alert("Kameraga ruxsat bering: " + err));
        }

        function addRow(data) {
            const tbody = document.querySelector("#resultTable tbody");
            const row = tbody.insertRow(0); // Eng yangisini tepaga qo'shish
            row.insertCell(0).innerText = data;
        }

        // Sahifa yuklanganda kamerani avtomatik ishga tushirish
        window.onload = startScanner;
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RFA Logistics System</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden; /* Ortiqcha aylantirish bo'lmasligi uchun */
            font-family: Arial, sans-serif;
        }

        /* Iframe to'liq ekran */
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            display: none; /* Yuklanishgacha yashirinadi */
        }

        /* Loader o'rnatish */
        #loader {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #ffffff; /* fon rangi */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .loader-gif {
            width: 120px;
            height: 120px;
        }
    </style>
</head>
<body>
    <!-- Loader -->
    <div id="loader">
        <img class="loader-gif"
            src="https://cdnl.iconscout.com/lottie/premium/thumb/delivery-man-loading-parcels-in-truck-animation-gif-download-3233933.gif"
            alt="Loading...">
        <div style="font-weight: 800; color: #007bff; margin-top: 20px; letter-spacing: 1px;">RFA LOGISTICS</div>
        <div style="font-size: 0.8rem; color: #6c757d; margin-top: 5px;">Ma'lumotlar qayta ishlanmoqda...</div>
    </div>

    <!-- Iframe -->
    <iframe src="https://script.google.com/macros/s/AKfycbwt3K3t6hgmnYYO92Z5g0DhEiN3JIk88mbcLxGYLsE6CRy7b8KHVYkkhm3LGhvnzl0i/exec" id="appFrame"></iframe>

    <script>
        const iframe = document.getElementById('appFrame');
        const loader = document.getElementById('loader');

        // Iframe yuklangach loader ni yashirish
        iframe.onload = function() {
            loader.style.display = 'none';
            iframe.style.display = 'block';
        }
    </script>
</body>
</html>
